<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meditest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="escritorio">
    <div id="iconos"></div>
  </div>

  <!-- PLANTILLA: ventana chakra -->
  <template id="tmpl-chakra">
    <div class="ventana ventana-chakra" data-type="chakra">
      <button class="ventana-cerrar" aria-label="cerrar"></button>
      <div class="ventana-body">
        <div class="franja franja-chakras">
          <div class="chakra-row"></div>
        </div>
        <div class="franja franja-color">
          <div class="color-info">
            <span class="color-nombre"></span>
            <span class="color-freq"></span>
          </div>
        </div>
        <div class="franja franja-controles">
          <div class="ctrl-col">
            <button class="ctrl-btn modo-btn" title="Cambiar modo de sonido">
              <span class="modo-label">sine</span>
            </button>
          </div>
          <div class="ctrl-col">
            <button class="ctrl-btn play-btn" title="Play / Pause">
              <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24" width="22" height="22" style="display:none"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
            </button>
          </div>
          <div class="ctrl-col">
            <div class="vol-wrap">
              <svg viewBox="0 0 24 24" width="14" height="14"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/></svg>
              <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
          </div>
        </div>
        <div class="rainbow-bar"></div>
      </div>
    </div>
  </template>

  <!-- PLANTILLA: ventana meditaciones -->
  <template id="tmpl-medi">
    <div class="ventana ventana-medi" data-type="medi">
      <button class="ventana-cerrar" aria-label="cerrar"></button>
      <div class="ventana-body">
        <ul class="medi-lista"></ul>
        <div class="medi-controles">
          <button class="ctrl-btn play-btn medi-play" title="Play / Pause">
            <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="22" height="22" style="display:none"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="rainbow-bar"></div>
      </div>
    </div>
  </template>

  <!-- PLANTILLA: ventana visualizador -->
  <template id="tmpl-viz">
    <div class="ventana ventana-viz" data-type="viz">
      <button class="ventana-cerrar" aria-label="cerrar"></button>
      <div class="ventana-body viz-body">
        <canvas class="viz-canvas"></canvas>
        <div class="viz-overlay">
          <span class="viz-preset-name"></span>
        </div>
        <div class="viz-no-audio">play something to see visuals</div>
      </div>
      <div class="rainbow-bar"></div>
    </div>
  </template>

  <!-- butterchurn -->
  <script src="vendor/butterchurn-presets/base.min.js" defer></script>
  <script type="module">
    import butterchurn from './vendor/butterchurn/butterchurn.js';
    window.butterchurn = butterchurn;
    window.dispatchEvent(new Event('butterchurn-ready'));
  </script>

  <!-- app modules -->
  <script src="audio-global.js"></script>
  <script src="sound-engines.js"></script>
  <script src="windows.js"></script>
  <script src="app-chakra.js"></script>
  <script src="app-medi.js"></script>
  <script src="app-viz.js"></script>
  <script src="app.js"></script>
</body>
</html>
