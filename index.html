<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meditest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- escritorio: iconos fijos arriba-izq -->
  <div id="escritorio">
    <div id="iconos"></div>
  </div>

  <!-- templates (se clonan y rellenan por JS desde data.json) -->

  <!-- PLANTILLA: ventana chakra -->
  <template id="tmpl-chakra">
    <div class="ventana ventana-chakra" data-type="chakra">
      <div class="ventana-titlebar" style="--ventana-glow: #d0bfff;">
        <button class="ventana-cerrar-btn" aria-label="cerrar">×</button>
        <span class="ventana-titulo">frecuencias</span>
      </div>
      <div class="ventana-body">
        <!-- franja 1: chakras (se rellena dinámicamente) -->
        <div class="franja franja-chakras">
          <div class="chakra-row"></div>
        </div>
        <!-- franja 2: color activo + info -->
        <div class="franja franja-color">
          <div class="color-info">
            <span class="color-nombre"></span>
            <span class="color-freq"></span>
          </div>
        </div>
        <!-- franja 3: controles -->
        <div class="franja franja-controles">
          <button class="ctrl-btn modo-btn" title="Cambiar modo de sonido">
            <span class="modo-label">sine</span>
          </button>
          <button class="ctrl-btn play-btn" title="Play / Pause">
            <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="28" height="28" style="display:none"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
          </button>
          <div class="vol-wrap">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/></svg>
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.5">
          </div>
        </div>
      </div>
    </div>
  </template>

  <!-- PLANTILLA: ventana meditaciones -->
  <template id="tmpl-medi">
    <div class="ventana ventana-medi" data-type="medi">
      <div class="ventana-titlebar" style="--ventana-glow: #06b6d4;">
        <button class="ventana-cerrar-btn" aria-label="cerrar">×</button>
        <span class="ventana-titulo">meditaciones</span>
      </div>
      <div class="ventana-body">
        <!-- lista se rellena dinámicamente -->
        <ul class="medi-lista"></ul>
        <div class="medi-controles">
          <span class="medi-now">—</span>
          <button class="ctrl-btn play-btn medi-play" title="Play / Pause">
            <svg class="icon-play" viewBox="0 0 24 24" width="24" height="24"><polygon points="6,3 20,12 6,21" fill="currentColor"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="24" height="24" style="display:none"><rect x="5" y="3" width="4" height="18" fill="currentColor"/><rect x="15" y="3" width="4" height="18" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- PLANTILLA: ventana visualizador -->
  <template id="tmpl-viz">
    <div class="ventana ventana-viz" data-type="viz">
      <div class="ventana-titlebar" style="--ventana-glow: #7c3aed;">
        <button class="ventana-cerrar-btn" aria-label="cerrar">×</button>
        <span class="ventana-titulo">visualizer</span>
      </div>
      <div class="ventana-body viz-body">
        <canvas class="viz-canvas"></canvas>
        <div class="viz-overlay">
          <span class="viz-preset-name"></span>
        </div>
        <div class="viz-no-audio">play something to see visuals</div>
      </div>
    </div>
  </template>

  <!-- butterchurn -->
  <script src="vendor/butterchurn-presets/base.min.js" defer></script>
  <script type="module">
    import butterchurn from './vendor/butterchurn/butterchurn.js';
    window.butterchurn = butterchurn;
    window.dispatchEvent(new Event('butterchurn-ready'));
  </script>

  <!-- app modules -->
  <script src="audio-global.js"></script>
  <script src="sound-engines.js"></script>
  <script src="windows.js"></script>
  <script src="app-chakra.js"></script>
  <script src="app-medi.js"></script>
  <script src="app-viz.js"></script>
  <script src="app.js"></script>
</body>
</html>
