<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meditest — test estéticas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="v6_1.css">
  <link rel="stylesheet" href="v6_2.css">
  <link rel="stylesheet" href="v6_3.css">
</head>
<body>
<div class="tbar">
  <button class="tbtn on" onclick="show('v6_1')">v6_1 · retro terminal</button>
  <button class="tbtn" onclick="show('v6_2')">v6_2 · grimorio</button>
  <button class="tbtn" onclick="show('v6_3')">v6_3 · arcade cósmico</button>
</div>
<script src="build.js"></script>
<script>
function show(id){
  document.querySelectorAll('.dm').forEach(d=>d.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  event.target.classList.add('on');
}
</script>
</body>
</html>
