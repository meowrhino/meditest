<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>meditest — test estética 13lunas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* paleta 13lunas — colores PLANOS, sin gradientes */
      --bg-deep: #2a0845;
      --bg-panel: #1a0530;
      --bg-green: #00a651;
      --bg-green-dark: #007a3d;
      --border-outer: #000;
      --border-inner: #c0c0c0;
      --border-highlight: #e0e0e0;
      --text-white: #ffffff;
      --text-green: #00e070;
      --text-yellow: #ffd700;
      --text-cyan: #00e5ff;
      --text-red: #ff3333;
      --text-purple: #d0bfff;
      --rainbow: #ff0000, #ff8800, #ffff00, #00cc44, #0088ff, #8800ff, #ff00cc;
    }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg-deep);
      color: var(--text-white);
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
    }

    /* ── TEXTURAS APILADAS (no gradientes) ── */

    /* capa 1: dots gruesos (como estrellas) */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, #fff 1px, transparent 1px),
        radial-gradient(circle, var(--text-purple) 0.8px, transparent 0.8px);
      background-size: 80px 80px, 120px 120px;
      background-position: 0 0, 40px 40px;
      opacity: 0.04;
    }

    /* capa 2: líneas diagonales sutiles */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        var(--text-purple) 10px,
        var(--text-purple) 11px
      );
    }

    /* ── LAYOUT ── */

    .page {
      position: relative;
      z-index: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── BEVEL MIXIN: borde biselado 3D tipo 13lunas ── */
    /*
       Estructura: borde negro exterior grueso,
       borde interior claro (highlight arriba-izq, shadow abajo-der)
    */

    .bevel {
      border: 4px solid var(--border-outer);
      outline: 2px solid var(--border-outer);
      outline-offset: 2px;
      box-shadow:
        inset 2px 2px 0 var(--border-highlight),
        inset -2px -2px 0 #666,
        6px 6px 0 rgba(0, 0, 0, 0.5);
    }

    .bevel-thin {
      border: 3px solid var(--border-outer);
      box-shadow:
        inset 1px 1px 0 var(--border-highlight),
        inset -1px -1px 0 #555,
        3px 3px 0 rgba(0, 0, 0, 0.4);
    }

    /* ── RAINBOW BAR (puntos de colores planos) ── */
    .rainbow-bar {
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #ff0000 0px, #ff0000 4px,
        #ff8800 4px, #ff8800 8px,
        #ffff00 8px, #ffff00 12px,
        #00cc44 12px, #00cc44 16px,
        #0088ff 16px, #0088ff 20px,
        #8800ff 20px, #8800ff 24px,
        #ff00cc 24px, #ff00cc 28px
      );
    }

    .rainbow-dots {
      height: 6px;
      background-image: radial-gradient(circle 2px, #ff0000 100%, transparent),
        radial-gradient(circle 2px, #ff8800 100%, transparent),
        radial-gradient(circle 2px, #ffff00 100%, transparent),
        radial-gradient(circle 2px, #00cc44 100%, transparent),
        radial-gradient(circle 2px, #0088ff 100%, transparent),
        radial-gradient(circle 2px, #8800ff 100%, transparent),
        radial-gradient(circle 2px, #ff00cc 100%, transparent);
      background-size: 28px 6px;
      background-position: 0 0, 4px 0, 8px 0, 12px 0, 16px 0, 20px 0, 24px 0;
      background-repeat: repeat-x;
    }

    /* ── VENTANA BISELADA ── */
    .window {
      background: var(--bg-panel);
      width: 440px;
      display: flex;
      flex-direction: column;
    }

    .window-titlebar {
      background: var(--bg-green);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 3px solid var(--border-outer);
    }

    .window-close {
      width: 18px;
      height: 18px;
      background: var(--text-red);
      border: 2px solid var(--border-outer);
      box-shadow: inset 1px 1px 0 #ff9999, inset -1px -1px 0 #990000;
      flex-shrink: 0;
    }

    .window-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-white);
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    }

    .window-body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── FRANJAS ── */
    .franja {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 85px;
      border-bottom: 3px solid var(--border-outer);
      position: relative;
    }

    .franja:last-child { border-bottom: none; }

    /* franja chakras: fondo violeta más claro */
    .franja-chakras {
      background: #3a0d5c;
      padding: 0;
    }

    .chakra-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 0;
    }

    .chakra-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 85px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 8px 2px;
      transition: background 0.15s;
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    .chakra-btn:last-child { border-right: none; }

    .chakra-btn:hover {
      background: rgba(255,255,255,0.06);
    }

    .chakra-btn.selected {
      background: rgba(255,255,255,0.1);
      box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
    }

    .chakra-btn svg {
      width: 44px;
      height: 44px;
      filter: drop-shadow(0 0 6px var(--cc, #fff));
    }

    /* franja color */
    .franja-color {
      background: var(--bg-green);
      position: relative;
    }

    /* textura sutil sobre la franja de color */
    .franja-color::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.3) 3px,
        rgba(0,0,0,0.3) 4px
      );
    }

    .color-info {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .color-nombre {
      font-size: 1.3rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-white);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
      letter-spacing: 3px;
    }

    .color-freq {
      font-size: 0.75rem;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    }

    /* franja controles */
    .franja-controles {
      background: var(--bg-panel);
      gap: 10px;
      padding: 8px 16px;
    }

    .ctrl-btn {
      background: var(--bg-deep);
      border: 2px solid var(--border-outer);
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.1), inset -1px -1px 0 rgba(0,0,0,0.3);
      color: var(--text-green);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 8px 14px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .ctrl-btn:hover {
      background: #3a0d5c;
    }

    .ctrl-btn.play-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 1.2rem;
      color: var(--text-white);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ctrl-btn.active {
      background: var(--bg-green);
      color: var(--text-white);
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-green);
      font-size: 0.7rem;
    }

    .vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 6px;
      background: #000;
      border: 1px solid #555;
      outline: none;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--text-green);
      border: 2px solid #000;
      cursor: pointer;
    }

    /* ── VENTANA MEDITACIONES ── */

    .window-medi { width: 320px; }

    .medi-lista {
      list-style: none;
      flex: 1;
      overflow-y: auto;
    }

    .medi-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-purple);
      border-bottom: 2px solid rgba(0,0,0,0.3);
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .medi-item:hover { background: rgba(255,255,255,0.03); }

    .medi-item.active-item {
      background: rgba(0, 166, 81, 0.15);
      color: var(--text-green);
      border-left: 4px solid var(--bg-green);
    }

    .medi-item span:last-child {
      color: var(--text-yellow);
      font-size: 0.6rem;
    }

    .medi-controles {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-top: 3px solid var(--border-outer);
      background: var(--bg-panel);
      gap: 10px;
    }

    .medi-now {
      font-size: 0.6rem;
      color: var(--text-yellow);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── LAYOUT DEMO ── */
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── ICONO DE ESCRITORIO ── */
    .iconos-demo {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
    }

    .icono-demo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .icono-demo-img {
      width: 48px;
      height: 48px;
      background: var(--bg-panel);
      border: 3px solid var(--border-outer);
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,0.15),
        inset -1px -1px 0 rgba(0,0,0,0.4),
        3px 3px 0 rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text-green);
    }

    .icono-demo-label {
      font-size: 0.5rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-green);
      letter-spacing: 0.5px;
    }

    /* label de la pagina */
    .page-label {
      font-size: 0.6rem;
      color: var(--text-yellow);
      text-transform: uppercase;
      letter-spacing: 3px;
      padding: 6px 20px;
      border: 2px solid var(--text-yellow);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="page-label">◆ meditest — estilo 13lunas ◆</div>

    <!-- iconos -->
    <div class="iconos-demo">
      <div class="icono-demo">
        <div class="icono-demo-img">~</div>
        <span class="icono-demo-label">frecuencias</span>
      </div>
      <div class="icono-demo">
        <div class="icono-demo-img">▶</div>
        <span class="icono-demo-label">meditaciones</span>
      </div>
      <div class="icono-demo">
        <div class="icono-demo-img">✦</div>
        <span class="icono-demo-label">visualizer</span>
      </div>
    </div>

    <div class="demo-row">

      <!-- VENTANA FRECUENCIAS -->
      <div class="window bevel">
        <div class="rainbow-bar"></div>
        <div class="window-titlebar">
          <div class="window-close"></div>
          <span class="window-title">frecuencias</span>
        </div>
        <div class="window-body">
          <div class="franja franja-chakras">
            <div class="chakra-row" id="chakra-row"></div>
          </div>
          <div class="franja franja-color" style="background: #69db7c;">
            <div class="color-info">
              <div class="color-nombre">corazón</div>
              <div class="color-freq">639 Hz</div>
            </div>
          </div>
          <div class="franja franja-controles">
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="ctrl-btn">om drone</div>
              <div class="ctrl-btn play-btn active">▶</div>
              <div class="vol-wrap">
                <span>♪</span>
                <input type="range" class="vol-slider" disabled>
              </div>
            </div>
          </div>
        </div>
        <div class="rainbow-bar"></div>
      </div>

      <!-- VENTANA MEDITACIONES -->
      <div class="window window-medi bevel">
        <div class="rainbow-dots"></div>
        <div class="window-titlebar">
          <div class="window-close"></div>
          <span class="window-title">meditaciones</span>
        </div>
        <div class="window-body">
          <ul class="medi-lista">
            <li class="medi-item active-item"><span>relajación guiada</span><span>0:26</span></li>
            <li class="medi-item"><span>respiración consciente</span><span>0:40</span></li>
            <li class="medi-item"><span>body scan</span><span>0:35</span></li>
          </ul>
          <div class="medi-controles">
            <span class="medi-now">relajación guiada</span>
            <div class="ctrl-btn play-btn">▶</div>
          </div>
        </div>
        <div class="rainbow-dots"></div>
      </div>

    </div>

  </div>

  <script>
    const COLORS = ['#ff6b6b','#ffa94d','#ffd43b','#69db7c','#748ffc','#d0bfff','#e599f7'];
    const SVGS = [
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><rect x="11" y="11" width="18" height="18" fill="none" stroke="${c}" stroke-width="2"/><circle cx="20" cy="20" r="4" fill="${c}"/>`,
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><circle cx="20" cy="20" r="10" fill="none" stroke="${c}" stroke-width="2"/><path d="M14 26 Q20 18 26 26" fill="none" stroke="${c}" stroke-width="1.8"/>`,
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><polygon points="20,30 8,12 32,12" fill="none" stroke="${c}" stroke-width="2" transform="rotate(180 20 20)"/><circle cx="20" cy="20" r="3" fill="${c}"/>`,
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><polygon points="20,9 28,27 12,27" fill="none" stroke="${c}" stroke-width="1.8"/><polygon points="20,31 12,13 28,13" fill="none" stroke="${c}" stroke-width="1.8"/>`,
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><circle cx="20" cy="20" r="11" fill="none" stroke="${c}" stroke-width="2"/><circle cx="20" cy="20" r="5" fill="none" stroke="${c}" stroke-width="1.5"/>`,
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><ellipse cx="20" cy="20" rx="13" ry="7" fill="none" stroke="${c}" stroke-width="1.8"/><circle cx="20" cy="20" r="4" fill="${c}"/>`,
      c => `<circle cx="20" cy="20" r="17" fill="none" stroke="${c}" stroke-width="1.5" opacity="0.4"/><circle cx="20" cy="20" r="10" fill="none" stroke="${c}" stroke-width="1.5"/><circle cx="20" cy="20" r="3" fill="${c}"/><line x1="20" y1="3" x2="20" y2="37" stroke="${c}" stroke-width="1" opacity="0.4"/><line x1="3" y1="20" x2="37" y2="20" stroke="${c}" stroke-width="1" opacity="0.4"/><line x1="8" y1="8" x2="32" y2="32" stroke="${c}" stroke-width="1" opacity="0.4"/><line x1="32" y1="8" x2="8" y2="32" stroke="${c}" stroke-width="1" opacity="0.4"/>`,
    ];

    const row = document.getElementById('chakra-row');
    COLORS.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'chakra-btn' + (i === 3 ? ' selected' : '');
      btn.style.setProperty('--cc', c);
      btn.innerHTML = `<svg viewBox="0 0 40 40">${SVGS[i](c)}</svg>`;
      btn.onclick = () => {
        row.querySelectorAll('.chakra-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.querySelector('.franja-color').style.background = c;
      };
      row.appendChild(btn);
    });
  </script>
</body>
</html>
